<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create WSN Network</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Wireless Sensor Network</h1>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>
</header>

<div class="container">

    <h2>Create Sensor Network</h2>

    <form method="POST">

        <label><b>Number of Sensor Nodes</b></label>

        <br><br>

        <input
            type="number"
            name="nodes"
            min="5"
            max="100"
            placeholder="Enter Number of Nodes"
            required
        >

        <br><br>

        <button type="submit" class="btn">
            Generate Network
        </button>

    </form>

    <br>

    {% if nodes %}

    <h2>Generated Sensor Nodes</h2>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>Node ID</th>
            <th>Energy (%)</th>
            <th>Status</th>
        </tr>

        {% for node in nodes %}

        <tr>
            <td>{{ node.id }}</td>
            <td>{{ node.energy }}</td>
            <td>{{ node.status }}</td>
        </tr>

        {% endfor %}

    </table>

    {% endif %}

</div>

<footer>

    <p>Energy-Aware Secure Data Transmission in WSN</p>

</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
