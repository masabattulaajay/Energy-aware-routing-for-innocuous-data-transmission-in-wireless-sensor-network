<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h2>Login</h2>
        <p>Energy-Aware Secure Data Transmission in WSN</p>

        {% if msg %}
            <p style="color:red;">{{ msg }}</p>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <a href="/">← Back to Home</a>

        <br><br>

        <p><b>Demo Login</b></p>
        <p>Username : admin</p>
        <p>Password : admin</p>

    </div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
